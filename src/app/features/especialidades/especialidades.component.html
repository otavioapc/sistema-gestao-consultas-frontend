<div class="container-fluid p-0 animate__animated animate__fadeIn">

  <div class="mb-4">
    <h3 class="fw-bold text-dark mb-1">Especialidades Clínicas</h3>
    <p class="text-muted small mb-0">Gerencie as categorias de atendimento oferecidas pela VestaPlan.</p>
  </div>

  <div class="row g-4">
    
    <div class="col-12 col-lg-4">
      <div class="card border-0 shadow-sm p-4 bg-white" style="border-radius: 16px;">
        <h5 class="fw-bold text-dark mb-3">
          <i class="bi bi-plus-circle-fill text-primary me-2" style="color: #5A1867 !important;"></i>Nova Especialidade
        </h5>
        
        <form [formGroup]="cadastroForm" (ngSubmit)="onCadastrar()">
          <div class="mb-4">
            <label class="form-label small fw-semibold text-muted">Nome da Especialidade</label>
            <input 
              type="text" 
              formControlName="nome"
              class="form-control bg-light border-0 py-2 small" 
              placeholder="Ex: Ortodontia" 
              style="border-radius: 8px;"
            >
          </div>

          <div class="d-flex gap-2">
            <button type="submit" [disabled]="cadastroForm.invalid" class="btn btn-primary fw-bold w-100 py-2 border-0" style="background-color: #5A1867; border-radius: 8px;">
              Salvar
            </button>
            <button type="button" (click)="cadastroForm.reset()" class="btn btn-light fw-semibold w-100 py-2 border-0" style="background-color: #ededed; border-radius: 8px; color: #6c757d;">
              Limpar
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="col-12 col-lg-8">
      <div class="card border-0 shadow-sm p-4 bg-white" style="border-radius: 16px;">
        
        <div class="input-group mb-3" style="max-width: 350px;">
          <span class="input-group-text bg-light border-0 text-muted"><i class="bi bi-search small"></i></span>
          <input type="text" class="form-control bg-light border-0 small" placeholder="Filtrar por nome..." style="font-size: 0.85rem;">
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light text-muted small">
              <tr>
                <th class="border-0 py-3" style="width: 120px;">ID</th>
                <th class="border-0 py-3">Especialidade</th>
                <th class="border-0 py-3 text-center" style="width: 120px;">Ações</th>
              </tr>
            </thead>
            <tbody class="small">
              
              @for (esp of listaEspecialidades; track esp.id) {
                <tr>
                  <td class="text-muted fw-mono">#{{ esp.id }}</td>
                  <td class="fw-bold text-dark">
                    <i class="bi bi-tag-fill text-success me-2" style="color: #76EAD7 !important;"></i>{{ esp.nome }}
                  </td>
                  <td class="text-center">
                    <div class="d-flex justify-content-center gap-2">
                      <button 
                        (click)="prepararEdicao(esp)"
                        class="btn btn-sm btn-light text-primary border-0" 
                        title="Editar" 
                        style="background-color: #F1E7F5;"
                      >
                        <i class="bi bi-pencil-square"></i>
                      </button>
                      
                      <button 
                        (click)="onDeletar(esp.id)"
                        class="btn btn-sm btn-light text-danger border-0" 
                        title="Excluir" 
                        style="background-color: #FCE8E6;"
                      >
                        <i class="bi bi-trash3-fill"></i>
                      </button>
                    </div>
                  </td>
                </tr>
              } @empty {
                <tr>
                  <td colspan="3" class="text-center text-muted py-4">
                    Nenhuma especialidade clínica encontrada no banco de dados.
                  </td>
                </tr>
              }

            </tbody>
          </table>
        </div>

      </div>
    </div>

  </div>

  <div class="custom-modal-backdrop" *ngIf="exibirModal">
    <div class="custom-modal-content p-4">
      
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold text-dark mb-0">Editar Nome</h5>
        <button type="button" class="btn-close small" (click)="fecharModal()"></button>
      </div>
      
      <form [formGroup]="edicaoForm" (ngSubmit)="onAtualizar()">
        <div class="mb-4">
          <label class="form-label small fw-semibold text-muted">Novo nome da especialidade</label>
          <input 
            type="text" 
            formControlName="nome"
            class="form-control bg-light border-0 py-2 small" 
            style="border-radius: 8px;"
          >
        </div>
        
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-light small fw-semibold flex-grow-1" (click)="fecharModal()" style="background-color: #ededed; border-radius: 8px; color: #6c757d;">
            Cancelar
          </button>
          <button type="submit" [disabled]="edicaoForm.invalid" class="btn btn-warning small fw-bold flex-grow-1 text-white" style="background-color: #ffc107; border-radius: 8px;">
            Atualizar
          </button>
        </div>
      </form>

    </div>
  </div>

</div>
