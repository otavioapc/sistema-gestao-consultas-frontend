<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4 border-0" style="max-width: 400px; width: 100%;">
    
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary"><i class="bi bi-shield-plus me-2"></i>VestaPlan</h2>
      <p class="text-muted small">Insira suas credenciais para acessar o painel</p>
    </div>

    <div *ngIf="mensagemErro" class="alert alert-danger py-2 small" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ mensagemErro }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-3">
        <label for="email" class="form-label small fw-semibold text-secondary">E-mail Corporativo</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
          <input 
            type="email" 
            id="email" 
            class="form-control border-start-0 ps-0" 
            placeholder="nome@vestaplan.com"
            formControlName="email"
          >
        </div>
      </div>

      <div class="mb-4">
        <label for="senha" class="form-label small fw-semibold text-secondary">Sua Senha</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
          <input 
            type="password" 
            id="senha" 
            class="form-control border-start-0 ps-0" 
            placeholder="••••••••"
            formControlName="senha"
          >
        </div>
      </div>

      <button 
        type="submit" 
        class="btn btn-primary w-100 fw-bold py-2 shadow-sm" 
        [disabled]="loginForm.invalid"
      >
        Entrar <i class="bi bi-arrow-right-short ms-1"></i>
      </button>

    </form>
  </div>
</div>
