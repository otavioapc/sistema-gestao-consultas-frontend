<div *ngIf="mostrarMenu" class="d-flex vh-100 overflow-hidden">
  
  <div class="text-white d-flex flex-column flex-shrink-0 p-3" 
       style="width: 260px; background-color: #5A1867;">
    
    <a href="#" class="d-flex align-items-center mb-4 me-md-auto text-white text-decoration-none border-bottom border-secondary pb-3 w-100">
      <i class="bi bi-fire text-success fs-3 me-2"></i>
      <span class="fs-4 fw-bold" style="letter-spacing: 1px;">VESTA<span class="fw-light text-white-50">PLAN</span></span>
    </a>

    <ul class="nav nav-pills flex-column mb-auto gap-1">
      <li class="nav-item">
        <a href="/dashboard" class="nav-link text-white d-flex align-items-center py-2 px-3 rounded" style="transition: 0.2s;">
          <i class="bi bi-grid-1x2-fill me-3"></i> Dashboard
        </a>
      </li>
      <li>
        <a href="/consultas" class="nav-link text-white d-flex align-items-center py-2 px-3 rounded">
          <i class="bi bi-calendar-check me-3"></i> Consultas
        </a>
      </li>
      <li>
        <a href="/pacientes" class="nav-link text-white d-flex align-items-center py-2 px-3 rounded">
          <i class="bi bi-person-bounding-box me-3"></i> Pacientes
        </a>
      </li>
      <li>
        <a href="/dentistas" class="nav-link text-white d-flex align-items-center py-2 px-3 rounded">
          <i class="bi bi-heart-pulse me-3"></i> Dentistas
        </a>
      </li>
      <li>
        <a href="/especialidades" class="nav-link text-white d-flex align-items-center py-2 px-3 rounded">
          <i class="bi bi-tags me-3"></i> Especialidades
        </a>
      </li>
      <li>
        <a href="/relatorios" class="nav-link text-white d-flex align-items-center py-2 px-3 rounded">
          <i class="bi bi-file-earmark-bar-graph me-3"></i> Relatórios
        </a>
      </li>
      <li>
        <a href="/usuarios" class="nav-link text-white d-flex align-items-center py-2 px-3 rounded">
          <i class="bi bi-shield-lock me-3"></i> Usuários (Admin)
        </a>
      </li>
    </ul>

    <div class="border-top border-secondary pt-3">
      <button (click)="logout()" class="btn btn-link text-white-50 text-decoration-none p-0 d-flex align-items-center small w-100 border-0 bg-transparent">
        <i class="bi bi-box-arrow-left me-2 fs-5 text-danger"></i> Sair do Sistema
      </button>
    </div>
  </div>

  <div class="d-flex flex-column flex-grow-1 h-100 bg-light">
    
    <header class="navbar navbar-expand bg-white shadow-sm px-4 py-2 border-bottom">
      <div class="container-fluid p-0 d-flex justify-content-between align-items-center">
        
        <div class="input-group style" style="max-width: 300px;">
          <span class="input-group-text bg-light border-0 text-muted"><i class="bi bi-search small"></i></span>
          <input type="text" class="form-control bg-light border-0 small" placeholder="Buscar no VestaPlan..." style="font-size: 0.85rem;">
        </div>

        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-link text-muted position-relative p-1 border-0 bg-transparent">
            <i class="bi bi-bell fs-5"></i>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
          </button>
          <div class="vr text-muted my-1" style="height: 20px;"></div>
          <div class="d-flex align-items-center gap-2">
            <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; font-size: 0.85rem; font-weight: 600;">
              DR
            </div>
            <div class="d-none d-sm-block text-start" style="line-height: 1.2;">
              <p class="mb-0 small fw-bold text-dark">Painel Clínico</p>
              <span class="text-muted" style="font-size: 0.75rem;">Profissional</span>
            </div>
          </div>
        </div>

      </div>
    </header>

    <main class="flex-grow-1 overflow-auto p-4">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>

<div *ngIf="!mostrarMenu">
  <router-outlet></router-outlet>
</div>
